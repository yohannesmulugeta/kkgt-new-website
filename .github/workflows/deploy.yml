name: Verify and deploy KKGT website to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  verify-and-package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Run zero-dependency website verification
        run: npm run check
      - name: Confirm testing-safe publication settings
        shell: bash
        run: |
          set -euo pipefail
          grep -q 'noindex,nofollow' index.html
          grep -q 'Disallow: /' robots.txt
          grep -q '/kkgt-new-website/standalone/audit-fixes.css' index.html
          if grep -q '/src/main.tsx' index.html; then
            echo 'The root page is still pointing to Vite source files.'
            exit 1
          fi
      - name: Package public website only
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p _site
          cp index.html 404.html robots.txt sitemap.xml _site/
          cp -R standalone _site/standalone
          touch _site/.nojekyll
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: verify-and-package
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
