name: Verify KKGT GitHub Pages site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Verify published root and local assets
        shell: bash
        run: |
          set -euo pipefail
          test -f index.html
          test -f 404.html
          test -f standalone/site.css
          test -f standalone/site-1.js
          test -f standalone/site-4.js
          test -f standalone/image-data-1.js
          test -f standalone/image-data-4.js
          test -f standalone/images/kkgt-logo.svg
          grep -q '/kkgt-new-website/standalone/site.css' index.html
          grep -q '/kkgt-new-website/standalone/site-4.js' index.html
          if grep -q '/src/main.tsx' index.html; then
            echo 'The root page is still pointing to Vite source files.'
            exit 1
          fi
      - name: Check JavaScript syntax
        shell: bash
        run: |
          cat standalone/site-1.js \
              standalone/image-data-1.js \
              standalone/image-data-2.js \
              standalone/image-data-3.js \
              standalone/image-data-4.js \
              standalone/site-2.js \
              standalone/site-3.js \
              standalone/site-4.js > /tmp/kkgt-site.js
          node --check /tmp/kkgt-site.js
