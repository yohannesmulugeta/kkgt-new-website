name: Apply full KKGT website update

on:
  push:
    branches: [main]
    paths:
      - project-update.b64
      - .github/workflows/deploy.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: kkgt-site-update
  cancel-in-progress: false

jobs:
  apply-update:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Decode and extract audited source package
        shell: bash
        run: |
          set -euo pipefail
          test -f project-update.b64
          base64 --decode project-update.b64 > /tmp/kkgt-source-update.tar.xz
          tar -xJf /tmp/kkgt-source-update.tar.xz -C .

      - name: Install pinned dependencies
        run: npm ci

      - name: Run lint and production build
        run: npm run check

      - name: Publish compiled website to repository root
        shell: bash
        run: |
          set -euo pipefail
          rm -rf assets images
          rm -f index.html 404.html favicon.svg robots.txt sitemap.xml .nojekyll
          cp -R dist/assets ./assets
          cp -R dist/images ./images
          cp dist/index.html ./index.html
          cp dist/404.html ./404.html
          cp dist/favicon.svg ./favicon.svg
          cp dist/robots.txt ./robots.txt
          cp dist/sitemap.xml ./sitemap.xml
          touch .nojekyll
          rm -f project-update.b64

      - name: Commit the improved source and compiled GitHub Pages site
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No repository changes to commit."
          else
            git commit -m "Apply full KKGT audit improvements and local visuals [skip ci]"
            git push origin main
          fi
